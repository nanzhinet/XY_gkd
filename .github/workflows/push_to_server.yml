name: push_to_server
on:
  workflow_dispatch:
  workflow_call:
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 等待推送完成
        run: sleep 10
      - name: 检出仓库代码
        uses: actions/checkout@v4

        with:
          ref: main
          fetch-depth: 1

      - name: 推送到国内服务器1
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/gkd.json5"
          target: "/www/wwwroot/github/"
          strip_components: 1
